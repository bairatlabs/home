<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zuppy Creator Partner Brief</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:#0f172a;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;display:flex;flex-direction:column;height:100vh;}
  .topbar{background:#1e293b;padding:12px 24px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #334155;flex-shrink:0;}
  .back{color:#94a3b8;text-decoration:none;font-size:14px;display:flex;align-items:center;gap:6px;}
  .back:hover{color:#fff;}
  .title{color:#fff;font-size:15px;font-weight:600;}
  .download{background:linear-gradient(135deg,#6c63ff,#4f46e5);color:#fff;padding:8px 20px;border-radius:8px;text-decoration:none;font-size:14px;font-weight:600;display:flex;align-items:center;gap:8px;transition:opacity .2s;cursor:pointer;border:none;}
  .download:hover{opacity:.85;}
  iframe{flex:1;width:100%;border:none;background:#fff;}
</style>
</head>
<body>
<div class="topbar">
  <a class="back" href="/zuppy">&#8592; Back to Zuppy</a>
  <span class="title">Creator Partner Brief</span>
  <button class="download" onclick="dlPDF()">&#8595; Download PDF</button>
</div>
<iframe src="/zuppy/creators-brief.pdf?v=1779815473800" title="Zuppy Creator Partner Brief"></iframe>
<script>
async function dlPDF(){
  try{
    const r=await fetch('/zuppy/creators-brief.pdf',{cache:'no-store'});
    const blob=await r.blob();
    const a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    a.download='Zuppy_Creator_Brief.pdf';
    a.click();
    URL.revokeObjectURL(a.href);
  }catch(e){
    window.location='/zuppy/creators-brief.pdf?dl=1&t='+Date.now();
  }
}
</script>
</body>
</html>
